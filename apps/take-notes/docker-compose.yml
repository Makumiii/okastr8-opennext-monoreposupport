services:
  take-notes:
    build:
      context: ../..
      dockerfile: apps/take-notes/Dockerfile
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3102"
      SQLITE_PATH: /data/take-notes.db
    ports:
      - "3102:3102"
    volumes:
      - take_notes_sqlite:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3102/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  take_notes_sqlite:
