services:
  task-tracker:
    build:
      context: ../..
      dockerfile: apps/task-tracker/Dockerfile
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: "3101"
      SQLITE_PATH: /data/task-tracker.db
    ports:
      - "3101:3101"
    volumes:
      - task_tracker_sqlite:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3101/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  task_tracker_sqlite:
